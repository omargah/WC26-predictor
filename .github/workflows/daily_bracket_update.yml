name: Daily Bracket Update

on:
  schedule:
    # 08:30 UTC ≈ 02:30 CDMX, después de partidos nocturnos.
    - cron: "30 8 * * *"
    # 17:30 UTC ≈ 11:30 CDMX, actualización de media jornada.
    - cron: "30 17 * * *"
    # 23:30 UTC ≈ 17:30 CDMX, actualización vespertina.
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-bracket-update
  cancel-in-progress: false

jobs:
  update-bracket:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Daily bracket refresh
        run: |
          python scripts/daily_bracket_refresh.py

      - name: Commit updated bracket and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -u
          git add data/processed data/features data/predictions data/reference data/snapshots reports scripts || true

          if git diff --cached --quiet; then
            echo "No hay cambios que commitear."
          else
            git commit -m "data: daily bracket update"
            git push origin main
          fi
